<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff5fa2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <title>Topadero</title>
    <style>
      /* Identidad visual de ./marketing (paleta cartoon/pop). Las fuentes de marca
         (Fraunces / Hanken Grotesk / Spline Sans Mono) NO están empaquetadas: se usan
         fuentes del sistema a propósito (no asumir que existen). Decisión documentada (T027). */
      :root {
        --sky: #7ec8f3; --orange: #ff7a1a; --teal: #2fd4c4;
        --pink: #ff5fa2; --gold: #d4af37; --ink: #14233b; --paper: #ffffff;
      }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--sky); }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; }
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--ink);
      }
      #hud .timer {
        position: absolute; top: 14px; left: 16px;
        font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums;
        color: var(--ink); background: var(--paper);
        padding: 6px 14px; border-radius: 999px;
        border: 3px solid var(--ink); box-shadow: 0 3px 0 var(--ink);
      }
      #hud .hint {
        position: absolute; bottom: 14px; left: 16px;
        font-size: 13px; font-weight: 700; color: var(--ink);
        background: var(--paper); padding: 6px 14px; border-radius: 999px;
        border: 3px solid var(--ink); box-shadow: 0 3px 0 var(--ink);
      }
      #hud .banner {
        position: absolute; inset: 0; display: none;
        align-items: center; justify-content: center; flex-direction: column;
        background: rgba(20,35,59,.55); text-align: center; color: var(--paper);
      }
      #hud .banner.show { display: flex; }
      #hud .banner h1 { margin: 0 0 8px; font-size: 48px; font-weight: 900; letter-spacing: 2px; color: var(--gold); }
      #hud .banner p { margin: 0; font-size: 20px; }
      /* Shell de juego (007): título, pausa, resultados, ajustes. Solo la pantalla activa (.show)
         captura el puntero; el HUD del cronómetro se oculta fuera de juego. */
      body:not([data-screen="playing"]) #hud { display: none; }
      #shell { position: fixed; inset: 0; pointer-events: none; z-index: 20;
        font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .shell-screen {
        position: fixed; inset: 0; display: none; pointer-events: auto;
        flex-direction: column; align-items: center; justify-content: center; gap: 14px;
        padding: max(24px, env(safe-area-inset-top)) 20px; box-sizing: border-box; text-align: center;
        background: rgba(20,35,59,.62); color: var(--paper);
        opacity: 0; transition: opacity .18s ease;
      }
      .shell-screen.show { display: flex; opacity: 1; }
      .shell-logo { margin: 0; font-size: clamp(40px, 12vw, 84px); font-weight: 900; letter-spacing: 3px; color: var(--gold); }
      .shell-screen h2 { margin: 0 0 4px; font-size: clamp(28px, 7vw, 44px); font-weight: 900; color: var(--paper); }
      .shell-hint { margin: 0 0 8px; max-width: 30em; font-size: 14px; font-weight: 600; opacity: .92; }
      .shell-hint b { color: var(--teal); }
      .shell-time { font-size: clamp(40px, 11vw, 72px); font-weight: 900; font-variant-numeric: tabular-nums; color: var(--gold); }
      .shell-best { font-size: 16px; font-weight: 700; min-height: 1.2em; }
      .shell-badge { display: none; font-weight: 900; color: var(--ink); background: var(--gold);
        padding: 4px 14px; border-radius: 999px; transform: rotate(-3deg); }
      .shell-badge.show { display: inline-block; }
      .shell-btn {
        min-width: 200px; min-height: 48px; padding: 12px 22px; font: inherit; font-weight: 800;
        color: var(--ink); background: var(--paper); border: 3px solid var(--ink);
        border-radius: 999px; box-shadow: 0 4px 0 var(--ink); cursor: pointer;
      }
      .shell-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ink); }
      .shell-btn.primary { color: var(--paper); background: var(--pink); }
      .shell-btn:focus-visible { outline: 4px solid var(--teal); outline-offset: 3px; }
      /* Panel de ajustes (modal sobre el título/pausa) */
      #settings-panel { background: rgba(20,35,59,.78); z-index: 30; }
      .settings-card {
        width: min(440px, 92vw); max-height: 86vh; overflow-y: auto;
        display: flex; flex-direction: column; gap: 12px;
        background: var(--paper); color: var(--ink);
        border: 3px solid var(--ink); border-radius: 18px; box-shadow: 0 6px 0 var(--ink);
        padding: 20px; text-align: left;
      }
      .settings-card h2 { color: var(--ink); margin: 0 0 6px; }
      .settings-subtitle { margin: 8px 0 0; font-size: 14px; opacity: .7; }
      .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-weight: 700; }
      .settings-row input[type="range"] { flex: 1; max-width: 60%; }
      .settings-row input[type="checkbox"] { width: 22px; height: 22px; }
      .settings-card .shell-btn.rebind { min-width: 0; min-height: 36px; padding: 6px 14px; font-size: 13px; box-shadow: 0 3px 0 var(--ink); }
      @media (prefers-reduced-motion: reduce) { .shell-screen { transition: none; } }
      /* Pantalla de arranque estática: feedback inmediato mientras el boot async (Rapier WASM +
         circuito del día + assets) prepara el shell; el JS la retira al montar el shell. */
      #boot { position: fixed; inset: 0; z-index: 40; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 10px; background: var(--sky);
        font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--ink); }
      #boot b { font-size: clamp(40px, 12vw, 84px); font-weight: 900; letter-spacing: 3px; color: var(--gold); }
      #boot span { font-size: 16px; font-weight: 700; opacity: .85; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="boot"><b>TOPADERO</b><span>Cargando…</span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
