name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos para el despliegue OIDC a Pages (verificado-doc: starter pages).
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no cancelar el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # Puerta del Principio II: si los tests fallan, no se sube artefacto ni se despliega.
      - run: npm test
      # tsc --noEmit && vite build -> ./dist (base relativa para servir bajo /topadero/).
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
